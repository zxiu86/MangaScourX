name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
    paths:
      - 'setup.py'
      - 'mangascourx/_version.py'   # تم تحديث المسار هنا ليطابق الهيكلية الجديدة
      - '**/*.py'
  
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.1)'
        required: false
        default: ''
        type: string

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Get version from _version.py
        id: get-version
        run: |
          # تم تصحيح المسار ليقرأ من داخل مجلد الحزمة الرئيسي mangascourx
          VERSION=$(python -c "exec(open('mangascourx/_version.py').read()); print(__version__)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION"
      
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel twine build
      
      - name: Build package
        run: python -m build
      
      - name: Check package
        run: twine check dist/*
      
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          twine upload dist/* --verbose

  create-release:
    needs: build-and-publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            dist/*.tar.gz
            dist/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
